# =========================================================
# PROBLEM DETAILS (RFC 9457) - TITLES
# =========================================================
problem.title.not_found=Resource not found
problem.title.internal_error=Internal server error
problem.title.bad_request=Bad request
problem.title.validation_failed=Validation failed
problem.title.method_not_allowed=Method not allowed
problem.title.service_error=Service error
problem.title.conflict=Conflict
problem.title.too_many_requests=Too many requests


# =========================================================
# PROBLEM DETAILS (RFC 9457) - GENERIC DETAILS
# (One canonical text source for ProblemDetail.detail)
# =========================================================
problem.detail.not_found=Requested resource was not found.
problem.detail.internal_error=Unexpected error occurred.
problem.detail.bad_request=Malformed request body.
problem.detail.validation_failed=One or more fields are invalid.
problem.detail.method_not_allowed=The request method is not supported for this resource.
problem.detail.service_error=The request could not be processed.
problem.detail.conflict=The request could not be completed due to a conflict.
problem.detail.too_many_requests=Too many requests. Please try again later.


# =========================================================
# REQUEST / PARAMETER VALIDATION (HTTP 400)
# (ValidationExceptionHandler + SpringHttpExceptionHandler)
# =========================================================
request.validation.failed=Request validation failed
request.param.invalid=One or more parameters are invalid.
request.param.required_missing=Missing required parameter: {0}
request.param.type_mismatch=Invalid value (expected {0}).
request.header.missing=Required request header ''{0}'' is missing


# =========================================================
# JSON / PAYLOAD (HTTP 400)
# (JsonExceptionHandler + SpringHttpExceptionHandler)
# =========================================================
request.body.invalid=Invalid JSON payload.
request.body.field.unrecognized=Unrecognized field: ''{0}''
request.body.invalid_format=Invalid format: expected {0}, value {1}

request.method.not_supported=HTTP method not supported: {0}
request.endpoint.not_found=Endpoint not found.


# =========================================================
# BEAN VALIDATION (FIELD-LEVEL) - MESSAGE KEYS
# (Used in DTO annotations like @NotBlank(message="{...}"))
# =========================================================
service.id.required=serviceId is required
service.id.size=serviceId must be between {min} and {max} characters

service.version.required=serviceVersion is required
service.version.size=serviceVersion must be between {min} and {max} characters

instance.id.required=instanceId is required
instance.id.size=instanceId must be between {min} and {max} characters

checksum.size=checksum must be between {min} and {max} characters

license.key.required=licenseKey is required
license.key.size=licenseKey must be between {min} and {max} characters

signature.required=signature is required
signature.size=signature must be between {min} and {max} characters

license.token.required=licenseToken is required
license.token.size=licenseToken must be between {min} and {max} characters
license.token.format=License token format is invalid


# =========================================================
# LICENSE API - SUCCESS / TOP-LEVEL MESSAGES (NON-ERROR)
# (If agent returns success messages anywhere)
# =========================================================
license.key.valid=License key is valid
license.token.valid=Token is valid
license.token.refreshed=Token has been refreshed


# =========================================================
# LICENSE API - FAILURE / USER-FACING TOP MESSAGE
# (Used as ProblemDetail.title in ApplicationExceptionHandler remote mapping)
# =========================================================
license.validation.failed=License validation failed
license.validation.error=An unexpected error occurred


# =========================================================
# REMOTE CALL / AGENT INTERNAL
# (Used by LicenseResponseHandler when mapping ApiProblemException)
# =========================================================
agent.remote.call.failed=Licensing service request failed
agent.remote.empty.token.top=Licensing service returned success but no token was included
agent.remote.empty.token.detail=Missing license token in response
agent.remote.no.payload=No additional error details


# =========================================================
# SERVER ERRORS (FALLBACK)
# (Used in ApplicationExceptionHandler generic mapping)
# =========================================================
server.internal.error=Internal server error. Please try again later.
server.unknown.error=Unknown server error. Please contact support if the problem persists.