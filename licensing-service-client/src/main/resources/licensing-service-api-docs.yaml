openapi: 3.1.0
info:
  title: Licensing Service API
  description: Licensing Service API with type-safe generic responses using OpenAPI
  version: 2.0.0
servers:
  - url: http://localhost:8081/licensing-service
    description: Local service URL
security:
  - basicAuth: []
paths:
  /v1/licenses/access:
    post:
      tags:
        - license-controller
      operationId: createAccess
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueAccessRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ServiceResponseLicenseAccessResponse"
  /v1/licenses/access/validate:
    post:
      tags:
        - license-controller
      operationId: validateAccess
      parameters:
        - name: License-Token
          in: header
          required: true
          schema:
            type: string
            maxLength: 400
            minLength: 200
            pattern: "^[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+$"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateAccessRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ServiceResponseLicenseAccessResponse"
components:
  schemas:
    IssueAccessRequest:
      type: object
      properties:
        licenseKey:
          type: string
          maxLength: 200
          minLength: 100
        instanceId:
          type: string
          maxLength: 100
          minLength: 10
        checksum:
          type: string
          maxLength: 200
          minLength: 40
        serviceId:
          type: string
          maxLength: 50
          minLength: 3
        serviceVersion:
          type: string
          maxLength: 20
          minLength: 3
        signature:
          type: string
          maxLength: 200
          minLength: 60
      required:
        - instanceId
        - licenseKey
        - serviceId
        - serviceVersion
        - signature
    LicenseAccessResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - TOKEN_CREATED
            - TOKEN_REFRESHED
            - TOKEN_ACTIVE
        licenseToken:
          type: string
    Meta:
      type: object
      properties:
        serverTime:
          type: string
          format: date-time
        sort:
          type: array
          items:
            $ref: "#/components/schemas/Sort"
      x-ignore-model: true
    ServiceResponseLicenseAccessResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/LicenseAccessResponse"
        meta:
          $ref: "#/components/schemas/Meta"
      x-api-wrapper: true
      x-api-wrapper-datatype: LicenseAccessResponse
    Sort:
      type: object
      properties:
        field:
          type: string
        direction:
          type: string
          enum:
            - ASC
            - DESC
      x-ignore-model: true
    ValidateAccessRequest:
      type: object
      properties:
        instanceId:
          type: string
          maxLength: 100
          minLength: 10
        checksum:
          type: string
          maxLength: 200
          minLength: 40
        serviceId:
          type: string
          maxLength: 50
          minLength: 3
        serviceVersion:
          type: string
          maxLength: 20
          minLength: 3
        signature:
          type: string
          maxLength: 200
          minLength: 60
      required:
        - instanceId
        - serviceId
        - serviceVersion
        - signature
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic