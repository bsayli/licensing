name: Build & Test

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build all modules (tests + coverage)
        run: mvn -B -q -ntp clean verify

      - name: Upload coverage (license-generator)
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: |
            license-generator/target/site/jacoco*/jacoco.xml
          flags: license-generator
          name: license-generator
          fail_ci_if_error: false

      - name: Upload coverage (licensing-service)
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: |
            licensing-service/target/site/jacoco*/jacoco.xml
          flags: licensing-service
          name: licensing-service
          fail_ci_if_error: false

      - name: Upload coverage (licensing-service-client)
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: |
            licensing-service-client/target/site/jacoco*/jacoco.xml
          flags: licensing-service-client
          name: licensing-service-client
          fail_ci_if_error: false

      - name: Upload coverage (licensing-agent)
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: |
            licensing-agent/target/site/jacoco*/jacoco.xml
          flags: licensing-agent
          name: licensing-agent
          fail_ci_if_error: false

      - name: Upload coverage (licensing-agent-cli)
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: |
            licensing-agent-cli/target/site/jacoco*/jacoco.xml
          flags: licensing-agent-cli
          name: licensing-agent-cli
          fail_ci_if_error: false