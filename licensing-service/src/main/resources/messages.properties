# =========================================================
# PROBLEM DETAILS (RFC 9457) - TITLES
# =========================================================
problem.title.not_found=Resource not found
problem.title.internal_error=Internal server error
problem.title.bad_request=Bad request
problem.title.validation_failed=Validation failed
problem.title.method_not_allowed=Method not allowed
problem.title.service_error=Service error
problem.title.conflict=Conflict
problem.title.too_many_requests=Too many requests


# =========================================================
# PROBLEM DETAILS (RFC 9457) - GENERIC DETAILS
